name: Chit-Chat CI action

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
      - name: Installing Dependencies
        run: |
          echo Installing Dependencies
          npm install
      - name: Creating build
        run: npm run build
        env:
          CC_ServerDomain: ${{ secrets.CC_ServerDomain }}
          CC_IMAGE_BUCKET_URL: ${{ secrets.CC_IMAGE_BUCKET_URL }}
          CC_OAuthClientID: ${{ secrets.CC_OAuthClientID }}
      - name: Deployment
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
